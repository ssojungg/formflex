version: "3"
#servicesлҘј м»Ён…Ңмқҙл„ҲлҘј м •мқҳ
services:
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - TZ=Asia/Seoul
      - NODE_ENV=development
    ports:
      - "8000:8000"
    command: ["nodemon", "-L", "server/index.js"] # м»Ён…Ңмқҙл„Ҳк°Җ мӢңмһ‘лҗ  л•Ң мӢӨн–үн•  лӘ…л №
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    volumes:
      - ./frontend/:/frontend
      - build_folder:/frontend/dist
    tty: true

volumes:
  build_folder: null
  elasticsearch:
  prometheus_data:
  grafana-data:
