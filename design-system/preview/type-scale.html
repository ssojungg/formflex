<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff'); font-display: swap; }
  body { margin: 0; font-family: 'Pretendard', system-ui, sans-serif; background: #f9fafb; padding: 16px; }
  .scale { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: baseline; gap: 12px; }
  .label { font-size: 10px; color: #9ca3af; width: 60px; flex-shrink: 0; font-family: monospace; }
  .sample { color: #111827; line-height: 1.2; }
  .muted { color: #6b7280; }
</style></head>
<body>
<div class="scale">
  <div class="row"><div class="label">6xl / 60px</div><div class="sample" style="font-size:42px;font-weight:700">FormFlex</div></div>
  <div class="row"><div class="label">4xl / 36px</div><div class="sample" style="font-size:32px;font-weight:700">설문을 만들고</div></div>
  <div class="row"><div class="label">3xl / 30px</div><div class="sample" style="font-size:26px;font-weight:700">분석하고 공유하세요</div></div>
  <div class="row"><div class="label">2xl / 24px</div><div class="sample" style="font-size:22px;font-weight:600">실시간 분석 대시보드</div></div>
  <div class="row"><div class="label">xl / 20px</div><div class="sample" style="font-size:20px;font-weight:600">AI 설문 자동 생성</div></div>
  <div class="row"><div class="label">lg / 18px</div><div class="sample muted" style="font-size:18px">몇 분 만에 전문적인 설문을 만들고</div></div>
  <div class="row"><div class="label">base / 16px</div><div class="sample muted" style="font-size:16px">응답자 N명 달성 시 자동 리포트를 받아보세요</div></div>
  <div class="row"><div class="label">sm / 14px</div><div class="sample muted" style="font-size:14px">신용카드 없이 시작 가능 · 무제한 설문 생성</div></div>
  <div class="row"><div class="label">xs / 12px</div><div class="sample muted" style="font-size:12px">전체 설문 · 총 응답 수 · 평균 완료율 · 활성 설문</div></div>
</div>
</body></html>
