<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #f9fafb; padding: 16px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 52px; border-radius: 8px; overflow: hidden; }
  .swatch-color { height: 48px; }
  .swatch-label { font-size: 10px; color: #6b7280; padding: 4px 2px 0; text-align: center; }
  .swatch-hex { font-size: 9px; color: #9ca3af; text-align: center; padding-bottom: 4px; }
  .title { font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; }
</style></head>
<body>
<div class="title">Neutral — Cool Gray</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#f9fafb;border:1px solid #e5e7eb"></div><div class="swatch-label">50</div><div class="swatch-hex">#f9fafb</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#f3f4f6;border:1px solid #e5e7eb"></div><div class="swatch-label">100</div><div class="swatch-hex">#f3f4f6</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#e5e7eb"></div><div class="swatch-label">200</div><div class="swatch-hex">#e5e7eb</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#d1d5db"></div><div class="swatch-label">300</div><div class="swatch-hex">#d1d5db</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#9ca3af"></div><div class="swatch-label">400</div><div class="swatch-hex">#9ca3af</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#6b7280"></div><div class="swatch-label">500</div><div class="swatch-hex">#6b7280</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#4b5563"></div><div class="swatch-label">600</div><div class="swatch-hex">#4b5563</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#374151"></div><div class="swatch-label">700</div><div class="swatch-hex">#374151</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1f2937"></div><div class="swatch-label">800</div><div class="swatch-hex">#1f2937</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#111827"></div><div class="swatch-label">900 ★</div><div class="swatch-hex">#111827</div></div>
</div>
</body></html>
