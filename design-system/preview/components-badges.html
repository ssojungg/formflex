<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff'); }
  body { margin: 0; font-family: 'Pretendard', system-ui, sans-serif; background: #f9fafb; padding: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; background: #eef2ff; color: #6366f1; }
  .title { font-size: 10px; font-weight: 600; color: #374151; margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style></head>
<body>
<div class="title">Status Badges</div>
<div class="row">
  <div class="badge" style="background:#d1fae5;color:#065f46">
    <div class="dot pulse" style="background:#10b981"></div>Active
  </div>
  <div class="badge" style="background:#fee2e2;color:#991b1b">
    <div class="dot" style="background:#ef4444"></div>Closed
  </div>
  <div class="badge" style="background:#f3f4f6;color:#374151">
    <div class="dot" style="background:#9ca3af"></div>Draft
  </div>
</div>
<div class="title">Hashtag Tags</div>
<div class="row">
  <span class="tag">#고객만족</span>
  <span class="tag">#시장조사</span>
  <span class="tag">#HR</span>
  <span class="tag">#이벤트</span>
  <span class="tag">#NPS</span>
  <span class="tag">#UX</span>
</div>
<div class="title">Pill Badges</div>
<div class="row">
  <div class="badge" style="background:#eef2ff;color:#4338ca">AI 기반</div>
  <div class="badge" style="background:#f0fdf4;color:#166534">무료</div>
  <div class="badge" style="background:#fef3c7;color:#92400e">Pro</div>
</div>
</body></html>
