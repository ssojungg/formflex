<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #f9fafb; padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .swatch { border-radius: 10px; overflow: hidden; }
  .swatch-color { height: 52px; display: flex; align-items: center; justify-content: center; }
  .swatch-label { font-size: 11px; font-weight: 600; color: #374151; padding: 5px 6px 2px; }
  .swatch-hex { font-size: 9px; color: #9ca3af; padding: 0 6px 6px; }
  .title { font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 10px; letter-spacing: .04em; text-transform: uppercase; }
</style></head>
<body>
<div class="title">Semantic Colors</div>
<div class="grid">
  <div class="swatch" style="background:#f0fdf4">
    <div class="swatch-color" style="background:#10b981"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>
    <div class="swatch-label">Success</div><div class="swatch-hex">#10b981</div>
  </div>
  <div class="swatch" style="background:#fffbeb">
    <div class="swatch-color" style="background:#f59e0b"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
    <div class="swatch-label">Warning</div><div class="swatch-hex">#f59e0b</div>
  </div>
  <div class="swatch" style="background:#fef2f2">
    <div class="swatch-color" style="background:#ef4444"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
    <div class="swatch-label">Error</div><div class="swatch-hex">#ef4444</div>
  </div>
  <div class="swatch" style="background:#eff6ff">
    <div class="swatch-color" style="background:#3b82f6"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
    <div class="swatch-label">Info</div><div class="swatch-hex">#3b82f6</div>
  </div>
</div>
</body></html>
