<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff');
  body { margin: 0; font-family: 'Pretendard', system-ui, sans-serif; background: #f9fafb; padding: 16px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 52px; border-radius: 8px; overflow: hidden; }
  .swatch-color { height: 48px; }
  .swatch-label { font-size: 10px; color: #6b7280; padding: 4px 2px 0; text-align: center; }
  .swatch-hex { font-size: 9px; color: #9ca3af; text-align: center; padding-bottom: 4px; }
  .title { font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; }
</style></head>
<body>
<div class="title">Primary — Indigo</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#eef2ff"></div><div class="swatch-label">50</div><div class="swatch-hex">#eef2ff</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#e0e7ff"></div><div class="swatch-label">100</div><div class="swatch-hex">#e0e7ff</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#c7d2fe"></div><div class="swatch-label">200</div><div class="swatch-hex">#c7d2fe</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#a5b4fc"></div><div class="swatch-label">300</div><div class="swatch-hex">#a5b4fc</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#818cf8"></div><div class="swatch-label">400</div><div class="swatch-hex">#818cf8</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#6366f1"></div><div class="swatch-label">500 ★</div><div class="swatch-hex">#6366f1</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#4f46e5"></div><div class="swatch-label">600</div><div class="swatch-hex">#4f46e5</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#4338ca"></div><div class="swatch-label">700</div><div class="swatch-hex">#4338ca</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#3730a3"></div><div class="swatch-label">800</div><div class="swatch-hex">#3730a3</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#312e81"></div><div class="swatch-label">900</div><div class="swatch-hex">#312e81</div></div>
</div>
</body></html>
