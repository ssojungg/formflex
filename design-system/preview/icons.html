<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #f9fafb; padding: 16px; }
  .title { font-size: 10px; font-weight: 600; color: #374151; margin-bottom: 10px; letter-spacing: .04em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .icon-box { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; background: white; border-radius: 8px; }
  .icon-box img { width: 20px; height: 20px; }
  .icon-label { font-size: 8px; color: #9ca3af; text-align: center; }
</style></head>
<body>
<div class="title">Icon Assets — Lucide-style stroke SVGs</div>
<div class="grid">
  <div class="icon-box"><img src="../assets/icons/add.svg" alt="add"><div class="icon-label">add</div></div>
  <div class="icon-box"><img src="../assets/icons/delete.svg" alt="delete"><div class="icon-label">delete</div></div>
  <div class="icon-box"><img src="../assets/icons/editPencil.svg" alt="edit"><div class="icon-label">edit</div></div>
  <div class="icon-box"><img src="../assets/icons/copy.svg" alt="copy"><div class="icon-label">copy</div></div>
  <div class="icon-box"><img src="../assets/icons/logout.svg" alt="logout"><div class="icon-label">logout</div></div>
  <div class="icon-box"><img src="../assets/icons/check.svg" alt="check"><div class="icon-label">check</div></div>
  <div class="icon-box"><img src="../assets/icons/email.svg" alt="email"><div class="icon-label">email</div></div>
  <div class="icon-box"><img src="../assets/icons/drop.svg" alt="drop"><div class="icon-label">drop</div></div>
  <div class="icon-box"><img src="../assets/icons/navAll.svg" alt="nav all"><div class="icon-label">navAll</div></div>
  <div class="icon-box"><img src="../assets/icons/navForm.svg" alt="nav form"><div class="icon-label">navForm</div></div>
  <div class="icon-box"><img src="../assets/icons/navRes.svg" alt="nav res"><div class="icon-label">navRes</div></div>
  <div class="icon-box"><img src="../assets/icons/menuAnalysis.svg" alt="analysis"><div class="icon-label">analysis</div></div>
  <div class="icon-box"><img src="../assets/icons/menuEdit.svg" alt="menu edit"><div class="icon-label">menuEdit</div></div>
  <div class="icon-box"><img src="../assets/icons/menuDel.svg" alt="menu del"><div class="icon-label">menuDel</div></div>
  <div class="icon-box"><img src="../assets/icons/menuLink.svg" alt="menu link"><div class="icon-label">menuLink</div></div>
  <div class="icon-box"><img src="../assets/icons/menuSee.svg" alt="menu see"><div class="icon-label">menuSee</div></div>
  <div class="icon-box"><img src="../assets/icons/flexLine.svg" alt="flex line"><div class="icon-label">flexLine</div></div>
</div>
</body></html>
