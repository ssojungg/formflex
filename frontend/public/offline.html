<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 - FormFlex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f8faf8 0%, #e8f0e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      background: #6B8E6B;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
    
    h1 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #6B8E6B;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    
    .retry-btn:hover {
      background: #5a7a5a;
    }
    
    .retry-btn:active {
      transform: scale(0.98);
    }
    
    .status {
      margin-top: 24px;
      padding: 12px;
      background: rgba(107, 142, 107, 0.1);
      border-radius: 8px;
      font-size: 14px;
      color: #6B8E6B;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zm-6.6 8.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7L12 21.5l3.07-3.9 4.3 4.29 1.28-1.27-3.61-5.4z"/>
      </svg>
    </div>
    
    <h1>인터넷 연결이 필요합니다</h1>
    <p>현재 오프라인 상태입니다. 네트워크에 연결되면 자동으로 다시 연결됩니다.</p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
      다시 시도
    </button>
    
    <div class="status" id="status">
      연결 상태를 확인하는 중...
    </div>
  </div>
  
  <script>
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = '온라인 상태입니다. 페이지를 새로고침하세요.';
        statusEl.style.background = 'rgba(107, 142, 107, 0.2)';
      } else {
        statusEl.textContent = '오프라인 상태입니다.';
        statusEl.style.background = 'rgba(239, 68, 68, 0.1)';
        statusEl.style.color = '#dc2626';
      }
    }
    
    updateStatus();
    window.addEventListener('online', () => {
      updateStatus();
      setTimeout(() => window.location.reload(), 1000);
    });
    window.addEventListener('offline', updateStatus);
  </script>
</body>
</html>
